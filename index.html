<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Test Master</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AI Test Generator</h1>
            <button id="theme-toggle">🌙/☀️</button>
        </header>
        <div class="card">
            <input type="file" id="fileInput" accept=".pdf, image/*">
            <button onclick="processFile()">Testləri Yarat</button>
        </div>
        <div id="stats-bar" style="display:none; justify-content: space-around; background: #1a73e8; color: white; padding: 10px; border-radius: 8px; margin: 10px 0;">
            <span>⏱ Vaxt: <b id="timer">00:00</b></span>
            <span>📝 Suallar: <b id="q-count">0</b></span>
        </div>
        <div id="loading" class="hidden">✨ AI Mətni analiz edir və suallar hazırlayır...</div>
        <div id="quiz-container"></div>
        <button id="submit-btn" class="hidden" onclick="checkResults()" style="margin-top: 20px; width: 100%;">İmtahanı Bitir</button>
    </div>
    <script>const pdfjsLib = window['pdfjs-dist/build/pdf']; pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';</script>
    <script src="script.js"></script>
</body>
</html>
